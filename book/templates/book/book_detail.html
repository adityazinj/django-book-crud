{% extends "book/base.html" %}

<title>{% block title %}{{bk.title}}{% endblock title %}</title>

{% block content %}

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h2 class="card-title mb-3 text-primary">{{ bk.title }}</h2>

          <p class="text-muted mb-3">{{ bk.description }}</p>

          <hr />

          <div class="mb-2"><strong>Author:</strong> {{ bk.author }}</div>

          <div class="mb-2">
            <strong>Published Date:</strong> {{ bk.publication_date }}
          </div>

          <div class="mb-2"><strong>ISBN:</strong> {{ bk.isbn }}</div>

          <div class="mt-4">
            <a href="{% url 'home' %}" class="btn btn-outline-primary btn-sm">
              ← Back to Books
            </a>
            <a href="{% url 'book-update' bk.id %}" class="btn btn-outline-secondary btn-sm">
              Edit
            </a>
            <a href="{% url 'book-delete' bk.id %}" class="btn btn-outline-danger btn-sm">
              Delete
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock content %}
